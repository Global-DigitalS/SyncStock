# =============================================================================
# CONFIGURACIÓN DE NGINX PARA SYNCSTOCK CON WEBSOCKETS
# =============================================================================
# 
# INSTRUCCIONES PARA PLESK:
# 1. Ve a: Dominios → app.sync-stock.com → Apache & nginx Settings
# 2. En la sección "Additional nginx directives", pega el contenido de abajo
# 3. Guarda y aplica los cambios
#
# =============================================================================

# Upstream para el backend
upstream syncstock_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# Configuración de WebSocket (necesaria para notificaciones en tiempo real)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Proxy para API y WebSocket
location /api/ {
    proxy_pass http://syncstock_backend/api/;
    proxy_http_version 1.1;
    
    # Headers estándar
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffer settings
    proxy_buffering off;
    proxy_buffer_size 16k;
    proxy_busy_buffers_size 24k;
    proxy_buffers 64 4k;
}

# WebSocket endpoint específico
location /ws/ {
    proxy_pass http://syncstock_backend/ws/;
    proxy_http_version 1.1;
    
    # IMPORTANTE: Headers para WebSocket
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    
    # Headers estándar
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts más largos para WebSocket (mantener conexión abierta)
    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;
    
    # Sin buffering para WebSocket
    proxy_buffering off;
}

# Health check endpoint
location /health {
    proxy_pass http://syncstock_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# =============================================================================
# CABECERAS DE SEGURIDAD — aplicadas a todas las respuestas del SPA React
# Referencia: https://developer.mozilla.org/en-US/docs/Web/HTTP/Guides/CSP
# =============================================================================

# HSTS — fuerza HTTPS durante 2 años, incluidos subdominios (MDN §HSTS)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Evitar MIME-type sniffing (MDN §X-Content-Type-Options)
add_header X-Content-Type-Options "nosniff" always;

# Política de Referrer estricta (MDN §Referrer-Policy)
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Deshabilitar permisos de hardware no utilizados (MDN §Permissions-Policy)
add_header Permissions-Policy
    "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(self), usb=()"
    always;

# X-Frame-Options — respaldo para navegadores sin soporte CSP Level 2
# (frame-ancestors en la CSP es la directiva canónica)
add_header X-Frame-Options "DENY" always;

# Declarar el endpoint de reporte (CSP Level 3 / Reporting API v1)
# MDN: https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Reporting-Endpoints
add_header Reporting-Endpoints 'csp-endpoint="/api/csp-report"' always;

# -----------------------------------------------------------------------
# Content-Security-Policy para el SPA React
#
# Directrices (MDN §CSP):
#
#   default-src 'self'
#       Fallback seguro para cualquier tipo de recurso no cubierto
#       por una directiva específica.
#
#   script-src 'self' https://js.stripe.com
#       Solo scripts del mismo origen y el SDK de Stripe.
#       'unsafe-inline' y 'unsafe-eval' se OMITEN:
#         – El build de producción de React (CRA) no los necesita.
#         – Eliminarlos elimina la superficie de ataque XSS más grande.
#
#   style-src 'self' 'unsafe-inline'
#       'unsafe-inline' es necesario porque Radix UI y Tailwind inyectan
#       estilos en línea en tiempo de ejecución mediante JS.
#       Migrar a nonces requeriría Server-Side Rendering.
#
#   img-src 'self' data: blob: https:
#       Imágenes del mismo origen, data URIs (avatares base64),
#       blobs (previsualizaciones) y cualquier HTTPS externo
#       (imágenes de producto de proveedores).
#
#   connect-src 'self' wss://app.sync-stock.com https://api.stripe.com
#       fetch/XHR al backend propio, WebSocket seguro para notificaciones
#       en tiempo real y la API de Stripe para confirmación de pagos.
#
#   font-src 'self'
#       Fuentes locales; los iconos de Lucide React están en JS (no @font-face).
#
#   frame-src https://js.stripe.com https://hooks.stripe.com
#       iframes de Stripe para el formulario de pago (Stripe.js).
#
#   object-src 'none'
#       Desactiva Flash y otros plugins — nunca necesarios (MDN §object-src).
#
#   base-uri 'self'
#       Impide inyección de <base href> que redirigiría recursos relativos.
#
#   form-action 'self'
#       Formularios solo pueden enviar al mismo origen.
#
#   frame-ancestors 'none'
#       Impide que la app sea embebida en iframes de terceros (clickjacking).
#       Equivalente moderno de X-Frame-Options DENY (CSP Level 2).
#
#   upgrade-insecure-requests
#       El navegador actualiza automáticamente peticiones HTTP → HTTPS
#       antes de enviarlas (MDN §upgrade-insecure-requests).
#
#   report-uri /api/csp-report
#       Las violaciones se envían (POST JSON) al endpoint de FastAPI.
#       Compatible con todos los navegadores actuales (CSP Level 2).
#
#   report-to csp-endpoint
#       Variante moderna de report-uri (Reporting API v1 / CSP Level 3).
#       Requiere la cabecera Reporting-Endpoints declarada arriba.
# -----------------------------------------------------------------------
add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss://app.sync-stock.com https://api.stripe.com; font-src 'self'; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests; report-uri /api/csp-report; report-to csp-endpoint"
    always;

# Servir archivos estáticos del frontend (React build)
location / {
    root /var/www/vhosts/app.sync-stock.com/app/frontend/build;
    try_files $uri $uri/ /index.html;

    # Cache para assets estáticos con hash en el nombre (CRA content-hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
